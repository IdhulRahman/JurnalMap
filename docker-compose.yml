version: "3.9"

# ============================================================
# JurnalMap — Production Docker Compose
# Services: backend (FastAPI) + frontend (React/Nginx) + MongoDB
# ============================================================

networks:
  jurnalmap-net:
    driver: bridge

volumes:
  mongo-data:        # MongoDB persistent storage
  backend-uploads:   # Uploaded PDF files

services:
  # ----------------------------------------------------------
  # MongoDB — Document Database
  # ----------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: jurnalmap-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${DB_NAME:-jurnalmap}
    volumes:
      - mongo-data:/data/db
    networks:
      - jurnalmap-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # NOTE: Do NOT expose port 27017 in production.
    # Uncomment below ONLY for local development debugging:
    # ports:
    #   - "27017:27017"

  # ----------------------------------------------------------
  # Backend — FastAPI + Uvicorn
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jurnalmap-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # MongoDB connection — uses root credentials
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongo:27017/${DB_NAME:-jurnalmap}?authSource=admin
      DB_NAME: ${DB_NAME:-jurnalmap}
      # Upload directory (mapped to named volume)
      UPLOAD_DIR: /app/uploads
      # LLM configuration
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      # CORS — restrict to your frontend domain in production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - jurnalmap-net
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------
  # Frontend — React (built) served by Nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # For production, change to your actual backend URL/domain.
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: jurnalmap-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jurnalmap-net
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
