version: "3.9"

# ============================================================
# JurnalMap — Production Docker Compose
# Services:
#   - mongo:    Document database (single node)
#   - backend:  FastAPI + Uvicorn + single in-process PDF queue worker
#   - frontend: React (CRA) build served by Nginx
#   - ollama:   OPTIONAL local LLM (Gemma/Llama/etc.) — start with `--profile ollama`
# ============================================================

networks:
  jurnalmap-net:
    driver: bridge

volumes:
  mongo-data:        # MongoDB persistent storage
  backend-uploads:   # Uploaded PDF files
  model-cache:       # Hugging Face / sentence-transformers cache
  ollama-data:       # Local LLM model files

services:
  # ----------------------------------------------------------
  # MongoDB — Document Database
  # ----------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: jurnalmap-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${DB_NAME:-jurnalmap}
    volumes:
      - mongo-data:/data/db
    networks:
      - jurnalmap-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Backend — FastAPI + Uvicorn (+ built-in PDF queue worker)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jurnalmap-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # MongoDB connection — uses root credentials
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongo:27017/${DB_NAME:-jurnalmap}?authSource=admin
      DB_NAME: ${DB_NAME:-jurnalmap}
      UPLOAD_DIR: /app/uploads
      # LLM config
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      # Local LLM (admin-provided). Set LOCAL_LLM_ENABLED=true to expose it in the UI.
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-false}
      LOCAL_LLM_NAME: ${LOCAL_LLM_NAME:-gemma-llm}
      LOCAL_LLM_ENDPOINT: ${LOCAL_LLM_ENDPOINT:-http://ollama:11434/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-ollama}
      # Embeddings (network graph)
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      # Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jurnalmap.local}
      # Uploads
      MAX_FILES_PER_UPLOAD: ${MAX_FILES_PER_UPLOAD:-5}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      # Queue worker
      QUEUE_POLL_INTERVAL: ${QUEUE_POLL_INTERVAL:-1.5}
      # HF cache location
      HF_HOME: /app/models
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - backend-uploads:/app/uploads
      - model-cache:/app/models
    networks:
      - jurnalmap-net
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Frontend — React (built) served by Nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: jurnalmap-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jurnalmap-net
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------
  # Ollama — OPTIONAL local LLM runtime.
  # Start with: `docker compose --profile ollama up -d`
  # Then set LOCAL_LLM_ENABLED=true in .env and re-launch backend.
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: jurnalmap-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - jurnalmap-net
    ports:
      - "11434:11434"
